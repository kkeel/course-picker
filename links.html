<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alveary – Lesson Links</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#596e5e">

  <link rel="apple-touch-icon" href="./img/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">

  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap"
  />

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/links.css">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" type="image/png" href="img/Alveary%20Lt.%20Green.png">
</head>

<body class="links-page">
  <header class="app-header mb-8 px-6 md:px-16 py-4 md:py-6 flex flex-col md:flex-row md:items-center gap-4">
    <a href="https://www.alveary.org/alveary-2026-2027/dashboard" class="logo-link flex items-center gap-3" aria-label="Go to Alveary dashboard">
      <img
        src="img/Alveary%20Lt.%20Green.png"
        alt="Alveary logo"
        class="object-contain"
        style="height: 40px; width: 40px;"
      />
      <div class="logo-text-block">
        <span class="logo-title">Alveary</span>
      </div>
    </a>

    <div class="mt-3 md:mt-0 md:ml-auto flex items-center justify-end gap-6 text-sm">
      <div id="app-step-nav" class="app-step-nav"></div>
    </div>
  </header>

  <main class="main-content px-6 lg:px-16 pb-16">
    <section class="links-hero">
      <div>
        <div class="links-kicker" id="linksSubject">Lesson Links</div>
        <h1 class="section-title links-title" id="linksTitle">Loading links…</h1>
        <p class="section-subtitle links-subtitle" id="linksSubtitle">
          Curated lesson links organized by term, week, and lesson.
        </p>
      </div>
    </section>

    <section class="links-quick-access" id="linksQuickAccess" hidden>
      <div class="links-quick-access-header">
        <h2>Quick Links</h2>
      </div>

      <div class="links-quick-access-grid" id="linksQuickAccessGrid"></div>
    </section>

    <section class="links-controls" id="linksControls" hidden>
      <label class="links-filter-label">
        Term
        <select id="termFilter" class="links-select"></select>
      </label>

      <label class="links-filter-label">
        Week
        <select id="weekFilter" class="links-select"></select>
      </label>

      <label class="links-filter-label">
        Topic
        <select id="topicFilter" class="links-select"></select>
      </label>

      <button type="button" id="clearFilters" class="links-clear-btn">
        Show all
      </button>
    </section>

    <section id="linksStatus" class="links-status">
      Loading lesson links…
    </section>

    <section id="linksContent" class="links-content" hidden></section>
  </main>

  <script src="js/links.js"></script>
</body>
</html>
