<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alveary – Extra Helpings</title>

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/extra-helpings.css">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" type="image/png" href="img/Alveary%20Lt.%20Green.png">
</head>

<body class="extra-page">
  <header class="app-header mb-8 px-6 md:px-16 py-4 md:py-6 flex flex-col md:flex-row md:items-center gap-4">
    <a href="https://www.alveary.org/alveary-2026-2027/dashboard" class="logo-link flex items-center gap-3" aria-label="Go to Alveary dashboard">
      <img src="img/Alveary%20Lt.%20Green.png" alt="Alveary logo" class="object-contain" style="height: 40px; width: 40px;" />
      <div class="logo-text-block">
        <span class="logo-title">Alveary</span>
      </div>
    </a>

    <div class="mt-3 md:mt-0 md:ml-auto flex items-center justify-end gap-6 text-sm">
      <div id="app-step-nav" class="app-step-nav"></div>
    </div>
  </header>

  <main class="extra-shell">
    <section class="extra-hero">
      <div class="extra-kicker" id="extraSubject">Extra Helpings</div>
      <h1 class="section-title extra-title" id="extraTitle">Loading Extra Helpings…</h1>
      <p class="section-subtitle extra-subtitle" id="extraSubtitle">
        Optional enrichment ideas, extra books, games, activities, and resources.
      </p>
    </section>

    <section class="extra-controls" id="extraControls" hidden>
      <label class="extra-filter-label">
        Term
        <select id="termFilter" class="extra-select">
          <option value="all">All terms</option>
          <option value="1">Term 1</option>
          <option value="2">Term 2</option>
          <option value="3">Term 3</option>
        </select>
      </label>

      <button type="button" id="clearFilters" class="extra-clear-btn">
        Show all
      </button>
    </section>

    <section id="extraStatus" class="extra-status">
      Loading Extra Helpings…
    </section>

    <section id="extraContent" class="extra-content" hidden></section>
  </main>

  <button id="back-to-top" class="back-to-top" type="button" aria-label="Back to top">
    ↑ Back to top
  </button>

  <script src="js/extra-helpings.js"></script>
</body>
</html>
