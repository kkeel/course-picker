name: Build Alveary Directory

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"   # daily at 8:30am UTC, after courses/resources JSON builds

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-directory:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Build directory, book views, and supply views
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          LESSON_WRITING_BASE_ID: ${{ secrets.LESSON_WRITING_BASE_ID }}
          LESSON_PLAN_SETS_TABLE: ${{ secrets.LESSON_PLAN_SETS_TABLE }}
        run: |
          node tools/build-alveary-directory.js
          node tools/build-supply-views.js

      - name: Commit updated directory files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add data/alveary-directory-index.json data/book-views data/supply-views

          if git diff --cached --quiet; then
            echo "No directory changes to commit"
          else
            git commit -m "Build Alveary directory and resource view JSON"
            git push
          fi
