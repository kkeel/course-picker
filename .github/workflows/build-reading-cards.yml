name: Build Reading Cards JSON

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-reading-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build reading cards JSON
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          LESSON_WRITING_BASE_ID: ${{ secrets.LESSON_WRITING_BASE_ID }}
        run: node flashcards/tools/build-reading-cards.mjs

      - name: Commit generated reading card JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/flashcards/reading
          git diff --cached --quiet && echo "No reading card JSON changes to commit" || git commit -m "Build reading cards JSON"
          git push
