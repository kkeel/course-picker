name: Build Extra Helpings

on:
  workflow_dispatch:
  schedule:
    - cron: "42 10 * * *"

permissions:
  contents: write

jobs:
  build-extra-helpings:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Build Extra Helpings JSON and images
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          ROTATION: 3
        run: node tools/build-extra-helpings-from-airtable.mjs

      - name: Commit generated Extra Helpings files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/extra-helpings img/extra-helpings

          if git diff --cached --quiet; then
            echo "No Extra Helpings changes to commit."
          else
            git commit -m "Build extra helpings JSON and images"
            git push
          fi
