name: Build Lesson Plan Hub

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"   # daily at 8:30am UTC, after courses/resources JSON builds

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-lesson-plan-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Build lesson plan hub, book views, and supply views
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          LESSON_WRITING_BASE_ID: ${{ secrets.LESSON_WRITING_BASE_ID }}
          LESSON_PLAN_SETS_TABLE: ${{ secrets.LESSON_PLAN_SETS_TABLE }}
          INCLUDE_PURCHASE_LINKS: "true"
        run: |
          node tools/build-lesson-plans.js
          node tools/build-supply-views.js

      - name: Commit updated lesson plan hub files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
          git add data/lesson-plans-index.json data/lesson-plan-views data/book-views data/supply-views
      
          if git diff --cached --quiet; then
            echo "No lesson plan hub changes to commit"
          else
            git commit -m "Build lesson plan hub and resource view JSON"
            git push
          fi
