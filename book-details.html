<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Details</title>
  <link rel="stylesheet" href="./css/book-details.css">
</head>
<body>
  <main class="book-shell">
    <section class="book-hero">
      <a class="back-link" href="./alveary-directory.html">← Alveary Directory</a>
      <div class="book-kicker">Book Directory View</div>
      <h1 id="book-title" class="book-title">Loading books…</h1>
      <p id="book-summary" class="book-summary"></p>
    </section>

    <section class="book-controls">
      <div class="book-base-toggle" aria-label="Choose book view">
        <button class="book-base-button is-active" type="button" data-base="grade">
          By Grade
        </button>
        <button class="book-base-button" type="button" data-base="subject">
          By Subject
        </button>
      </div>
    
      <div class="control-group">
        <label for="primary-select">Choose one</label>
        <div class="select-row">
          <select id="primary-select"></select>
          <button class="clear-select" type="button" data-clear="primary" aria-label="Reset main selection">×</button>
        </div>
      </div>
    
      <div class="control-group">
        <label for="course-filter">Course</label>
        <div class="select-row">
          <select id="course-filter">
            <option value="">All courses</option>
          </select>
          <button class="clear-select" type="button" data-clear="course" aria-label="Reset course">×</button>
        </div>
      </div>
    
      <div class="control-group">
        <label for="topic-filter">Topic</label>
        <div class="select-row">
          <select id="topic-filter">
            <option value="">All topics</option>
          </select>
          <button class="clear-select" type="button" data-clear="topic" aria-label="Reset topic">×</button>
        </div>
      </div>
    
      <div class="control-group control-search">
        <label for="book-search">Search</label>
        <input id="book-search" type="search" placeholder="Search books, authors, notes...">
      </div>
    </section>

    <section id="book-results" class="book-results">
      <div class="empty-state">Loading book view…</div>
    </section>
  </main>

  <script src="./js/book-details.js"></script>
</body>
</html>
